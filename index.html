<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Card Tracker</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card-bg: #12121a;
    --border: #1e1e2e;
    --text: #e0e0e8;
    --muted: #8888a0;
    --accent: #6c5ce7;
    --accent2: #00cec9;
    --green: #00b894;
    --orange: #fdcb6e;
    --red: #e17055;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 2rem;
  }
  .header {
    max-width: 1200px;
    margin: 0 auto 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .subtitle { color: var(--muted); font-size: 0.9rem; }
  .stats {
    display: flex;
    gap: 2rem;
  }
  .stat {
    text-align: center;
  }
  .stat .num {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent2);
  }
  .stat .label {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .filters {
    max-width: 1200px;
    margin: 0 auto 1.5rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.4rem 1rem;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(108,92,231,0.1);
  }
  .grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 1.2rem;
  }
  .product-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    transition: border-color 0.2s, transform 0.2s;
  }
  .product-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .product-card .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.75rem;
  }
  .product-card .name {
    font-size: 1.2rem;
    font-weight: 600;
  }
  .product-card .category {
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 12px;
    background: rgba(108,92,231,0.15);
    color: var(--accent);
    white-space: nowrap;
  }
  .product-card .desc {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 1rem;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .product-card .desc.expanded {
    -webkit-line-clamp: unset;
  }
  .product-card .meta {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    font-size: 0.8rem;
  }
  .meta-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .meta-label {
    color: var(--muted);
    min-width: 60px;
  }
  .meta-value { color: var(--text); }
  .meta-value a {
    color: var(--accent2);
    text-decoration: none;
  }
  .meta-value a:hover { text-decoration: underline; }
  .status-badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .status-live { background: rgba(0,184,148,0.15); color: var(--green); }
  .status-beta { background: rgba(253,203,110,0.15); color: var(--orange); }
  .status-pilot { background: rgba(108,92,231,0.15); color: var(--accent); }
  .network-badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 8px;
    font-size: 0.7rem;
    font-weight: 500;
    margin-right: 0.3rem;
    margin-top: 0.2rem;
  }
  .network-visa { background: rgba(26,35,126,0.2); color: #7986cb; }
  .network-mastercard { background: rgba(255,152,0,0.15); color: #ffb74d; }
  .network-badges { display: flex; flex-wrap: wrap; gap: 0.2rem; margin-top: 0.4rem; }
  .notes {
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
  }
  .updated {
    max-width: 1200px;
    margin: 2rem auto 0;
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
  }
  @media (max-width: 480px) {
    body { padding: 1rem; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🃏 Agent Card Tracker</h1>
    <div class="subtitle">Products giving AI agents access to cards and payment infrastructure</div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="num" id="total-count">0</div>
      <div class="label">Products</div>
    </div>
    <div class="stat">
      <div class="num" id="live-count">0</div>
      <div class="label">Live</div>
    </div>
  </div>
</div>

<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>
<div class="updated" id="updated"></div>

<script>

cked cards, single-use cards, category-locked cards (e.g. travel only). Controls enforced at card authorization level before transaction is approved. Stablecoin-funded cards (USDC) coming soon.", "website": "https://privacy.com", "twitter": "https://x.com/privacyhq", "category": "Agent Card Issuer", "status": "Live", "funding": null, "usage_data": null, "added": "2026-03-15", "notes": "Consumer-friendly positioning vs developer-first competitors. Works anywhere cards are accepted, no merchant integration needed. Published OpenClaw-specific setup guide. Stablecoin-funded cards (USDC) on roadmap, bridging crypto and traditional rails.", "network_partners": null, "positioning": "Consumers and prosumers / anyone giving agents spending power", "integrations": ["Web dashboard", "Mobile app", "Browser extension"]}, {"id": "phantom-mcp", "name": "Phantom MCP Server", "description": "MCP server enabling AI agents to interact with Phantom wallet — view addresses, sign transactions, transfer tokens, and swap across Solana, Ethereum, Bitcoin, and Sui. Compatible with Claude, Cursor, VS Code.", "website": "https://help.phantom.com/hc/en-us/articles/49235725504147-Get-started-with-Phantom-MCP", "twitter": "https://x.com/phantom", "category": "Agent Card Issuer", "status": "Live", "funding": "Phantom (Series C, $1.2B valuation)", "usage_data": "Supports Solana, Ethereum, Bitcoin, Sui", "added": "2026-02-18", "notes": "Largest consumer crypto wallet (15M+ users) shipping native MCP. Agents can swap, sign, and manage all on-chain addresses. Local-first — wallet keys stay on device.", "network_partners": null, "positioning": "Crypto-native developers and AI agent builders", "integrations": ["MCP server", "Claude", "Cursor", "VS Code"]}, {"id": "brale", "name": "Brale", "description": "Stablecoin infrastructure platform letting businesses create, manage, and move fiat-backed stablecoins. API-first architecture with programmable wallets for agent-driven stablecoin payments and treasury ": ["MCP server", "CLI", "API"]}, {"id": "webacy", "name": "Webacy", "description": "Agent-native blockchain risk intelligence. MCP server that lets AI agents screen wallets, tokens, and contracts in real time before executing transactions. Safety layer for agent commerce.", "website": "https://www.webacy.com", "twitter": "https://x.com/webaboracy", "category": "Agent Card Issuer", "status": "Live", "funding": null, "usage_data": null, "added": "2026-03-25", "notes": "Risk/safety layer, not a payment rail. Agents can check if a wallet, token, or contract is safe before transacting. Critical infrastructure for autonomous agent payments.", "network_partners": null, "positioning": "Agent platforms needing pre-transaction risk screening", "integrations": ["MCP server", "Claude Code", "Cursor"]}, {"id": "cryptoapis-mcp", "name": "CryptoAPIs MCP Servers", "description": "14 purpose-built MCP servers giving AI agents real-time blockchain access across EVM, UTXO, Solana, XRP, and more. Query wallets, estimate gas, simulate transactions, sign locally.", "website": "https://cryptoapis.io", "twitter": "https://x.com/CryptoAPIs", "category": "Agent Card Issuer", "status": "Live", "funding": null, "usage_data": "14 MCP servers, multi-chain support", "added": "2026-03-20", "notes": "Broadest multi-chain MCP coverage. Single npx command to spin up. Covers everything from wallet queries to transaction signing across all major chains.", "network_partners": null, "positioning": "Developers needing multi-chain agent access", "integrations": ["MCP server (14 servers)", "CLI (npx)", "API"]}, {"id": "coinbase-payments-mcp", "name": "Coinbase Payments MCP", "description": "MCP server connecting AI agents to Coinbase crypto wallets, onramps, and stablecoin transactions. Part of Coinbase Developer Platform. Enables USDC payments and wallet management via agent tooling.", "website": "https://docs.cdp.coinbase.com", "twitter": "https://x.com/CoinbaseDev", "category": "Agent Card Issuer", "sta function getStatusClass(status) {
  const s = status.toLowerCase();
  if (s.includes('live')) return 'status-live';
  if (s.includes('beta')) return 'status-beta';
  return 'status-pilot';
}

function render(filter) {
  const grid = document.getElementById('grid');
  const filtered = filter === 'All'
    ? products
    : products.filter(p => p.category.includes(filter));

  document.getElementById('total-count').textContent = products.length;
  document.getElementById('live-count').textContent = products.filter(p => p.status.toLowerCase().includes('live')).length;

  grid.innerHTML = filtered.map(p => `
    <div class="product-card" data-category="${p.category}">
      <div class="top">
        <div class="name">${p.name}</div>
        <span class="category">${p.category}</span>
      </div>
      <div class="desc">${p.description}</div>
      <div class="meta">
        <div class="meta-row">
          <span class="meta-label">Status</span>
          <span class="status-badge ${getStatusClass(p.status)}">${p.status}</span>
        </div>
        ${p.website ? `<div class="meta-row"><span class="meta-label">Website</span><span class="meta-value"><a href="${p.website}" target="_blank">${new URL(p.website).hostname}</a></span></div>` : ''}
        ${p.twitter ? `<div class="meta-row"><span class="meta-label">X</span><span class="meta-value"><a href="${p.twitter}" target="_blank">${p.twitter.split('/').pop()}</a></span></div>` : ''}
        ${p.positioning ? `<div class="meta-row"><span class="meta-label">For</span><span class="meta-value">${p.positioning}</span></div>` : ''}
        ${p.integrations ? `<div class="meta-row"><span class="meta-label">Ships as</span><span class="meta-value">${p.integrations.join(', ')}</span></div>` : ''}
        ${p.funding ? `<div class="meta-row"><span class="meta-label">Funding</span><span class="meta-value">${p.funding}</span></div>` : ''}
        ${p.usage_data ? `<div class="meta-row"><span class="meta-label">Usage</span><span class="meta-value">${p.usage_data}</span></div>` : ''}
      </div>
      ${p.network_partners ? `<div class="network-badges">${p.network_partners.map(n => `<span class="network-badge ${n.includes('Visa') ? 'network-visa' : 'network-mastercard'}">${n}</span>`).join('')}</div>` : ''}
      ${p.notes ? `<div class="notes">${p.notes}</div>` : ''}
    </div>
  `).join('');
}

// Build filter buttons
const categories = ['All', ...new Set(products.map(p => p.category))];
const filtersEl = document.getElementById('filters');
categories.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (c === 'All' ? ' active' : '');
  btn.textContent = c;
  btn.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(c);
  };
  filtersEl.appendChild(btn);
});

document.getElementById('updated').textContent = 'Last updated: ' + new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
render('All');
</script>

</body>
</html>
